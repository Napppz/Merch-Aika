<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login Debug - Detailed Trace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #00d4ff;
      padding: 2rem;
      line-height: 1.5;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { margin-bottom: 2rem; color: #00d4ff; }
    .section { background: #141b2e; border: 1px solid #00d4ff; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
    .section h2 { color: #29b6f6; margin-bottom: 1rem; border-bottom: 1px solid #00d4ff; padding-bottom: 0.5rem; }
    button { background: #00d4ff; color: #0a0e27; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 0.5rem; }
    button:hover { background: #29b6f6; }
    .log { background: #0a0e27; border: 1px solid #333; padding: 1rem; border-radius: 4px; margin-top: 1rem; max-height: 500px; overflow-y: auto; }
    .log-entry { padding: 0.5rem; margin: 0.2rem 0; border-left: 3px solid #00d4ff; padding-left: 0.8rem; }
    .success { color: #4caf50; border-left-color: #4caf50; }
    .error { color: #f44336; border-left-color: #f44336; }
    .warning { color: #ff9800; border-left-color: #ff9800; }
    .info { color: #2196f3; border-left-color: #2196f3; }
    input { background: #0a0e27; border: 1px solid #00d4ff; color: #00d4ff; padding: 8px; border-radius: 4px; margin: 0.5rem; width: 300px; }
    .step-box { background: #1a2540; border: 2px solid #00d4ff; padding: 1rem; margin: 1rem 0; border-radius: 4px; }
    .step-box h3 { color: #00d4ff; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Admin Login Debug - Complete Flow Trace</h1>

    <!-- Section: Quick Trace -->
    <div class="section">
      <h2>⚡ Quick Trace</h2>
      <button onclick="quickTrace()">Run Quick Trace</button>
      <button onclick="fullTrace()">Run Full Trace</button>
      <button onclick="clearLogs()">Clear Logs</button>
      <div class="log" id="quickLog"></div>
    </div>

    <!-- Section: Step-by-step -->
    <div class="section">
      <h2>📋 Step-by-Step Manual Test</h2>
      
      <div class="step-box">
        <h3>Step 1: Manual Login via API</h3>
        <input type="text" id="username" placeholder="Username (default: Aika)" value="Aika">
        <input type="password" id="password" placeholder="Password (default: Aikanap2213)" value="Aikanap2213">
        <button onclick="manualLogin()">🟢 Call Login API</button>
        <div class="log" id="manualLoginLog"></div>
      </div>

      <div class="step-box">
        <h3>Step 2: Check Token Storage</h3>
        <button onclick="checkTokenStorage()">🔍 Check Token Storage</button>
        <div class="log" id="storageLog"></div>
      </div>

      <div class="step-box">
        <h3>Step 3: Simulate Dashboard Check</h3>
        <button onclick="simulateDashboardCheck()">🎯 Simulate Dashboard Check</button>
        <div class="log" id="dashboardCheckLog"></div>
      </div>

      <div class="step-box">
        <h3>Step 4: Test Actual Navigation</h3>
        <button onclick="testNavigation()">🚀 Test Navigation to Dashboard</button>
        <button onclick="window.location.href='/admin/dashboard.html'">Go to /admin/dashboard.html</button>
        <div class="log" id="navigationLog"></div>
      </div>
    </div>

    <!-- Section: Current State -->
    <div class="section">
      <h2>📊 Current System State</h2>
      <button onclick="showSystemState()">Show Current State</button>
      <div class="log" id="stateLog"></div>
    </div>
  </div>

  <script>
    function log(elementId, message, type = 'info') {
      const logEl = document.getElementById(elementId);
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = message;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog(elementId) {
      document.getElementById(elementId).innerHTML = '';
    }

    function clearLogs() {
      clearLog('quickLog');
      clearLog('manualLoginLog');
      clearLog('storageLog');
      clearLog('dashboardCheckLog');
      clearLog('navigationLog');
      clearLog('stateLog');
    }

    async function quickTrace() {
      clearLog('quickLog');
      log('quickLog', '🔍 Quick Trace Started...', 'info');
      
      // 1. Check localStorage
      const token = localStorage.getItem('adminToken');
      log('quickLog', token ? '✓ adminToken exists' : '❌ adminToken NOT found', token ? 'success' : 'error');
      
      // 2. Check if valid
      if (!token) {
        log('quickLog', 'Need to login first', 'warning');
        return;
      }

      // 3. Check format
      const parts = token.split('.');
      log('quickLog', `Token parts: ${parts.length}`, parts.length === 3 ? 'success' : 'error');

      // 4. Check expiry
      try {
        const payload = JSON.parse(atob(parts[1]));
        const now = Math.floor(Date.now() / 1000);
        const expired = payload.exp < now;
        log('quickLog', `Token user: ${payload.username}`, 'info');
        log('quickLog', `Expired: ${expired}`, expired ? 'error' : 'success');
        
        if (!expired) {
          log('quickLog', '✅ Token is VALID and can access dashboard', 'success');
        }
      } catch (e) {
        log('quickLog', `Token decode error: ${e.message}`, 'error');
      }
    }

    async function fullTrace() {
      clearLog('quickLog');
      log('quickLog', '📊 Full System Trace', 'info');
      
      // 1. Check localStorage
      log('quickLog', '\n1️⃣ STORAGE CHECK:');
      const tokenLS = localStorage.getItem('adminToken');
      log('quickLog', `  - adminToken: ${tokenLS ? '✓ EXISTS' : '❌ MISSING'}`, tokenLS ? 'success' : 'error');
      
      const userInfo = localStorage.getItem('aika_admin_user');
      log('quickLog', `  - aika_admin_user: ${userInfo ? '✓ EXISTS' : '❌ MISSING'}`, userInfo ? 'success' : 'error');

      // 2. Check API
      log('quickLog', '\n2️⃣ API CONNECTIVITY:');
      try {
        const res = await fetch('/api/admin-login?_check=true', { method: 'HEAD' });
        log('quickLog', `  - API accessible: ${res.ok ? '✓ YES' : '❌ NO'}`, res.ok ? 'success' : 'error');
      } catch (e) {
        log('quickLog', `  - API error: ${e.message}`, 'error');
      }

      // 3. Check paths
      log('quickLog', '\n3️⃣ URL PATHS:');
      log('quickLog', `  - Current URL: ${window.location.href}`, 'info');
      log('quickLog', `  - Dashboard path: /admin/dashboard.html`, 'info');

      // 4. Browser info
      log('quickLog', '\n4️⃣ BROWSER:');
      log('quickLog', `  - localStorage available: ${typeof(Storage) !== 'undefined' ? '✓ YES' : '❌ NO'}`, 'info');
      log('quickLog', `  - JavaScript enabled: ✓ YES`, 'success');
    }

    async function manualLogin() {
      clearLog('manualLoginLog');
      const username = document.getElementById('username').value || 'Aika';
      const password = document.getElementById('password').value || 'Aikanap2213';

      log('manualLoginLog', `Attempting login with: ${username}`, 'info');
      log('manualLoginLog', 'Calling /api/admin-login...', 'info');

      try {
        const res = await fetch('/api/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        log('manualLoginLog', `Response status: ${res.status}`, res.status === 200 ? 'success' : 'error');

        const data = await res.json();
        
        if (data.success && data.admin && data.admin.token) {
          log('manualLoginLog', '✅ Login successful!', 'success');
          log('manualLoginLog', `Token received: ${data.admin.token.substring(0, 40)}...`, 'success');

          // Store token
          localStorage.setItem('adminToken', data.admin.token);
          log('manualLoginLog', '✓ Token stored in localStorage', 'success');

          // Verify
          const verify = localStorage.getItem('adminToken');
          log('manualLoginLog', `✓ Verification: Token accessible: ${verify ? 'YES' : 'NO'}`, verify ? 'success' : 'error');

        } else {
          log('manualLoginLog', `❌ Login failed: ${data.message}`, 'error');
        }
      } catch (err) {
        log('manualLoginLog', `❌ Error: ${err.message}`, 'error');
      }
    }

    function checkTokenStorage() {
      clearLog('storageLog');
      log('storageLog', '🔍 Checking Token Storage...', 'info');

      const token = localStorage.getItem('adminToken');
      if (!token) {
        log('storageLog', '❌ No adminToken in localStorage', 'error');
        log('storageLog', 'You need to login first using "Call Login API" button above', 'warning');
        return;
      }

      log('storageLog', '✓ adminToken found', 'success');
      log('storageLog', `Length: ${token.length} characters`, 'info');
      log('storageLog', `First 50 chars: ${token.substring(0, 50)}...`, 'info');

      // Check format
      const parts = token.split('.');
      log('storageLog', `Parts: ${parts.length} (expected: 3)`, parts.length === 3 ? 'success' : 'error');

      if (parts.length === 3) {
        try {
          const header = JSON.parse(atob(parts[0]));
          const payload = JSON.parse(atob(parts[1]));
          
          log('storageLog', '\n📝 Token Header:', 'info');
          log('storageLog', JSON.stringify(header, null, 2), 'info');
          
          log('storageLog', '\n📝 Token Payload:', 'info');
          log('storageLog', JSON.stringify(payload, null, 2), 'success');
        } catch (e) {
          log('storageLog', `❌ Token decode error: ${e.message}`, 'error');
        }
      }
    }

    function simulateDashboardCheck() {
      clearLog('dashboardCheckLog');
      log('dashboardCheckLog', 'Simulating dashboard.html security check...', 'info');

      const token = localStorage.getItem('adminToken');

      if (!token) {
        log('dashboardCheckLog', '❌ No token. Dashboard akan redirect ke login', 'error');
        log('dashboardCheckLog', 'Action: Login terlebih dahulu', 'warning');
        return;
      }

      try {
        const parts = token.split('.');
        if (parts.length !== 3) {
          throw new Error(`Invalid format: ${parts.length} parts`);
        }

        const payload = JSON.parse(atob(parts[1]));
        const now = Math.floor(Date.now() / 1000);

        log('dashboardCheckLog', `✓ Token format valid (3 parts)`, 'success');
        log('dashboardCheckLog', `✓ User: ${payload.username} | Role: ${payload.role}`, 'success');
        log('dashboardCheckLog', `✓ Issued: ${new Date(payload.iat * 1000).toLocaleString()}`, 'info');
        log('dashboardCheckLog', `✓ Expires: ${new Date(payload.exp * 1000).toLocaleString()}`, 'info');

        if (payload.exp < now) {
          log('dashboardCheckLog', '❌ Token EXPIRED', 'error');
          log('dashboardCheckLog', 'Action: Login lagi untuk get token baru', 'warning');
        } else {
          log('dashboardCheckLog', `✅ Token VALID (not expired)`, 'success');
          log('dashboardCheckLog', '✅ Dashboard security check PASSED', 'success');
          log('dashboardCheckLog', '✅ You can safely navigate to /admin/dashboard.html', 'success');
        }

      } catch (error) {
        log('dashboardCheckLog', `❌ Error: ${error.message}`, 'error');
        log('dashboardCheckLog', 'Action: Token mungkin rusak, perlu login ulang', 'warning');
      }
    }

    function testNavigation() {
      clearLog('navigationLog');
      log('navigationLog', 'Testing navigation...');
      log('navigationLog', 'URL: /admin/dashboard.html', 'info');
      log('navigationLog', 'Method: window.location.href', 'info');
      
      const token = localStorage.getItem('adminToken');
      if (!token) {
        log('navigationLog', '⚠️ Warning: No token in localStorage', 'warning');
        log('navigationLog', 'Dashboard will redirect to login', 'warning');
      } else {
        log('navigationLog', '✓ Token will be checked by dashboard', 'success');
      }

      log('navigationLog', '', 'info');
      log('navigationLog', 'Navigating in 2 seconds...', 'info');
      
      setTimeout(() => {
        window.location.href = '/admin/dashboard.html';
      }, 2000);
    }

    function showSystemState() {
      clearLog('stateLog');
      
      log('stateLog', '📊 SYSTEM STATE SNAPSHOT', 'info');
      
      log('stateLog', '\n1. ENVIRONMENT:', 'info');
      log('stateLog', `  - URL: ${window.location.origin}`, 'info');
      log('stateLog', `  - Path: ${window.location.pathname}`, 'info');
      log('stateLog', `  - Environment: ${window.location.hostname.includes('vercel') ? 'PRODUCTION' : 'LOCAL'}`, 'info');

      log('stateLog', '\n2. STORAGE:', 'info');
      const token = localStorage.getItem('adminToken');
      log('stateLog', `  - adminToken: ${token ? `✓ (${token.length} chars)` : '❌ MISSING'}`, token ? 'success' : 'error');

      const userInfo = localStorage.getItem('aika_admin_user');
      log('stateLog', `  - aika_admin_user: ${userInfo ? '✓ EXISTS' : '❌ MISSING'}`, userInfo ? 'success' : 'error');

      if (userInfo) {
        try {
          const user = JSON.parse(userInfo);
          log('stateLog', `    └─ User: ${user.username} | Role: ${user.role}`, 'info');
        } catch (e) {
          log('stateLog', `    └─ ⚠️ Parse error`, 'warning');
        }
      }

      log('stateLog', '\n3. CAPABILITIES:', 'info');
      log('stateLog', `  - localStorage: ${typeof(Storage) !== 'undefined' ? '✓ YES' : '❌ NO'}`, 'info');
      log('stateLog', `  - JavaScript: ✓ YES`, 'success');
      log('stateLog', `  - Cookies: ${navigator.cookieEnabled ? '✓ YES' : '❌ NO'}`, 'info');

      log('stateLog', '\n4. QUICK CHECK:', 'info');
      if (!token) {
        log('stateLog', '⚠️ Not logged in. Use "Call Login API" first.', 'warning');
      } else {
        try {
          const parts = token.split('.');
          if (parts.length !== 3) {
            log('stateLog', '❌ Token format invalid', 'error');
          } else {
            const payload = JSON.parse(atob(parts[1]));
            const now = Math.floor(Date.now() / 1000);
            if (payload.exp < now) {
              log('stateLog', '⚠️ Token expired. Need to login again.', 'warning');
            } else {
              log('stateLog', '✅ Ready for dashboard access', 'success');
            }
          }
        } catch (e) {
          log('stateLog', '❌ Token parsing error', 'error');
        }
      }
    }
  </script>
</body>
</html>
