<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login Diagnostic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0f1419;
      color: #e0e0e0;
      padding: 2rem;
      line-height: 1.6;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #00bcd4; margin-bottom: 1rem; }
    .section {
      background: #1a1f2e;
      border: 1px solid #00bcd4;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .section h2 {
      color: #29b6f6;
      margin-bottom: 1rem;
      border-bottom: 1px solid #00bcd4;
      padding-bottom: 0.5rem;
    }
    .test-btn {
      background: #00bcd4;
      color: #0f1419;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin: 0.5rem 0.5rem 0.5rem 0;
    }
    .test-btn:hover { background: #29b6f6; }
    .log { background: #0f1419; padding: 1rem; border-radius: 4px; margin-top: 1rem; max-height: 400px; overflow-y: auto; }
    .log-entry { padding: 0.3rem 0; }
    .success { color: #4caf50; }
    .error { color: #f44336; }
    .warning { color: #ff9800; }
    .info { color: #2196f3; }
    input, select {
      background: #0f1419;
      border: 1px solid #00bcd4;
      color: #e0e0e0;
      padding: 8px;
      border-radius: 4px;
      margin: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Admin Login Diagnostic Center</h1>
    
    <!-- Section 1: Storage Check -->
    <div class="section">
      <h2>📦 localStorage/sessionStorage Check</h2>
      <button class="test-btn" onclick="checkStorage()">Check Storage</button>
      <button class="test-btn" onclick="clearStorage()">Clear Storage</button>
      <div class="log" id="storage-log"></div>
    </div>

    <!-- Section 2: API Test -->
    <div class="section">
      <h2>🌐 API Login Test</h2>
      <div>
        <input type="text" id="test-username" placeholder="Username" value="Aika">
        <input type="password" id="test-password" placeholder="Password" value="Aikanap2213">
        <button class="test-btn" onclick="testLoginAPI()">Test Login API</button>
      </div>
      <div class="log" id="api-log"></div>
    </div>

    <!-- Section 3: Token Validation -->
    <div class="section">
      <h2>🔑 Token Validation</h2>
      <button class="test-btn" onclick="validateToken()">Validate Token</button>
      <button class="test-btn" onclick="decodeToken()">Decode Token</button>
      <div class="log" id="token-log"></div>
    </div>

    <!-- Section 4: Dashboard Simulation -->
    <div class="section">
      <h2>📊 Dashboard Redirect Test</h2>
      <p>Ini akan mensimulasikan apa yang terjadi saat dashboard.html load:</p>
      <button class="test-btn" onclick="simulateDashboard()">Simulate Dashboard Check</button>
      <button class="test-btn" onclick="window.location.href='/admin/dashboard.html'">Go to Dashboard</button>
      <div class="log" id="dashboard-log"></div>
    </div>

    <!-- Section 5: CORS Test -->
    <div class="section">
      <h2>🔗 CORS Test</h2>
      <button class="test-btn" onclick="testCORS()">Test CORS Headers</button>
      <div class="log" id="cors-log"></div>
    </div>
  </div>

  <script>
    function log(elementId, message, type = 'info') {
      const logEl = document.getElementById(elementId);
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = message;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog(elementId) {
      document.getElementById(elementId).innerHTML = '';
    }

    function checkStorage() {
      clearLog('storage-log');
      
      log('storage-log', '📋 localStorage items:');
      const items = {
        adminToken: localStorage.getItem('adminToken'),
        aika_admin_user: localStorage.getItem('aika_admin_user'),
        aika_admin: localStorage.getItem('aika_admin'),
        aika_admin_token: sessionStorage.getItem('aika_admin_token')
      };

      for (const [key, val] of Object.entries(items)) {
        if (val) {
          log('storage-log', `  ✓ ${key}: ${val.substring(0, 50)}...`, 'success');
        } else {
          log('storage-log', `  ✗ ${key}: NOT FOUND`, 'warning');
        }
      }

      if (localStorage.getItem('adminToken')) {
        log('storage-log', '\n✅ adminToken ditemukan!', 'success');
      } else {
        log('storage-log', '\n❌ adminToken TIDAK ada. Perlu login dulu.', 'error');
      }
    }

    function clearStorage() {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('aika_admin_user');
      localStorage.removeItem('aika_admin');
      sessionStorage.removeItem('aika_admin_token');
      log('storage-log', '✓ Storage cleared', 'success');
    }

    async function testLoginAPI() {
      clearLog('api-log');
      
      const username = document.getElementById('test-username').value;
      const password = document.getElementById('test-password').value;

      log('api-log', `Testing login dengan: ${username}`, 'info');
      log('api-log', 'Sending request to /api/admin-login...');

      try {
        const response = await fetch('/api/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        log('api-log', `Status: ${response.status}`, response.status === 200 ? 'success' : 'error');
        
        const data = await response.json();

        if (data.success && data.admin.token) {
          log('api-log', '✅ Login berhasil!', 'success');
          log('api-log', `Token received: ${data.admin.token.substring(0, 40)}...`, 'success');
          
          // Save token
          localStorage.setItem('adminToken', data.admin.token);
          log('api-log', '✓ Token saved to localStorage', 'success');
        } else {
          log('api-log', `❌ Login failed: ${data.message}`, 'error');
        }
      } catch (err) {
        log('api-log', `❌ Error: ${err.message}`, 'error');
      }
    }

    function validateToken() {
      clearLog('token-log');
      
      const token = localStorage.getItem('adminToken');
      if (!token) {
        log('token-log', '❌ No token in localStorage', 'error');
        return;
      }

      log('token-log', '🔍 Validating token...', 'info');
      
      try {
        const parts = token.split('.');
        if (parts.length !== 3) {
          throw new Error(`Invalid format: ${parts.length} parts instead of 3`);
        }

        log('token-log', '✓ Token format valid (3 parts)', 'success');

        const payload = JSON.parse(atob(parts[1]));
        const now = Math.floor(Date.now() / 1000);

        log('token-log', `✓ Issued at: ${new Date(payload.iat * 1000).toLocaleString()}`, 'info');
        log('token-log', `✓ Expires at: ${new Date(payload.exp * 1000).toLocaleString()}`, 'info');

        if (payload.exp > now) {
          log('token-log', '✅ Token is VALID and NOT expired', 'success');
        } else {
          log('token-log', '❌ Token EXPIRED', 'error');
        }
      } catch (err) {
        log('token-log', `❌ Validation error: ${err.message}`, 'error');
      }
    }

    function decodeToken() {
      clearLog('token-log');
      
      const token = localStorage.getItem('adminToken');
      if (!token) {
        log('token-log', '❌ No token to decode', 'error');
        return;
      }

      try {
        const parts = token.split('.');
        
        log('token-log', '📝 Header:', 'info');
        const header = JSON.parse(atob(parts[0]));
        log('token-log', JSON.stringify(header, null, 2), 'info');

        log('token-log', '\n📝 Payload:', 'info');
        const payload = JSON.parse(atob(parts[1]));
        log('token-log', JSON.stringify(payload, null, 2), 'success');

        log('token-log', `\n✓ Signature: ${parts[2].substring(0, 30)}...`, 'info');
      } catch (err) {
        log('token-log', `❌ Decode error: ${err.message}`, 'error');
      }
    }

    function simulateDashboard() {
      clearLog('dashboard-log');

      log('dashboard-log', 'Simulating dashboard.html security check...\n', 'info');

      const token = localStorage.getItem('adminToken');
      
      if (!token) {
        log('dashboard-log', '[SECURITY] No admin token found. Would redirect to login.', 'warning');
        log('dashboard-log', 'Result: ❌ WOULD BE REDIRECTED', 'error');
        return;
      }

      try {
        log('dashboard-log', '✓ Token found in localStorage', 'success');

        const parts = token.split('.');
        if (parts.length !== 3) {
          throw new Error('Invalid token format');
        }

        log('dashboard-log', '✓ Token format valid', 'success');

        const payload = JSON.parse(atob(parts[1]));
        const now = Math.floor(Date.now() / 1000);

        log('dashboard-log', `✓ Token user: ${payload.username} (${payload.role})`, 'success');

        if (payload.exp && payload.exp < now) {
          log('dashboard-log', '[SECURITY] Token expired. Would redirect to login.', 'warning');
          log('dashboard-log', 'Result: ❌ WOULD BE REDIRECTED (expired)', 'error');
          return;
        }

        log('dashboard-log', '[SECURITY] Admin token verified successfully', 'success');
        log('dashboard-log', 'Result: ✅ WOULD LOAD DASHBOARD', 'success');

      } catch (error) {
        log('dashboard-log', `[SECURITY] Token verification failed: ${error.message}`, 'error');
        log('dashboard-log', 'Result: ❌ WOULD BE REDIRECTED (error)', 'error');
      }
    }

    async function testCORS() {
      clearLog('cors-log');

      log('cors-log', 'Testing CORS headers...', 'info');

      try {
        const response = await fetch('/api/admin-login', {
          method: 'OPTIONS',
          headers: { 'Content-Type': 'application/json' }
        });

        log('cors-log', `✓ CORS-Allow-Origin: ${response.headers.get('Access-Control-Allow-Origin') || 'NOT SET'}`, 'info');
        log('cors-log', `✓ CORS-Allow-Methods: ${response.headers.get('Access-Control-Allow-Methods') || 'NOT SET'}`, 'info');
        log('cors-log', `✓ CORS-Allow-Headers: ${response.headers.get('Access-Control-Allow-Headers') || 'NOT SET'}`, 'info');

        log('cors-log', '\n✅ CORS seems configured', 'success');
      } catch (err) {
        log('cors-log', `❌ CORS error: ${err.message}`, 'error');
      }
    }

    // Auto-check on load
    window.addEventListener('load', () => {
      checkStorage();
    });
  </script>
</body>
</html>
