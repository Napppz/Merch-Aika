<!DOCTYPE html>
<!-- Presentasi: Halaman konfirmasi yang menampilkan ringkasan pesanan setelah transaksi berhasil dibuat. -->
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesanan Berhasil — Aika Sesilia Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .success-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .success-card {
      max-width: 600px;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-blue);
    }
    .success-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-card h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--aqua);
      margin-bottom: 0.5rem;
    }
    .success-card p { color: var(--text-muted); margin-bottom: 0.5rem; }
    .order-detail {
      background: rgba(3,9,31,0.5);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin: 2rem 0;
      text-align: left;
    }
    .order-detail h3 {
      font-family: var(--font-display);
      font-size: 0.9rem;
      color: var(--aqua);
      margin-bottom: 1rem;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(41,182,246,0.1);
    }
    .detail-row:last-child { border: none; }
    .detail-row span:first-child { color: var(--text-muted); }
    .detail-row span:last-child { color: var(--white); font-weight: 600; }
    .items-list { margin: 1rem 0; }
    .item-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 0.3rem 0;
      color: var(--text-muted);
    }
    .item-row span:last-child { color: var(--aqua); }
    .cta-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="success-wrap">
  <div class="success-card" id="successCard">
    <div class="success-icon">🎉</div>
    <h1>Pesanan Berhasil!</h1>
    <p>Terima kasih telah berbelanja di Aika Sesilia Store! 💙</p>
    <p>Pesananmu sedang diproses dan akan segera dikirim.</p>
    <div class="order-detail" id="orderDetail">
      <h3>Detail Pesanan</h3>
      <!-- Filled by JS -->
    </div>
    <div class="cta-buttons">
      <a href="shop.html" class="btn-primary">🛍️ Lanjut Belanja</a>
      <a href="index.html" class="btn-ghost">🏠 Ke Beranda</a>
    </div>
  </div>
</div>

<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Try sessionStorage first (contains latest invoice data), then fallback to localStorage
  let order = JSON.parse(sessionStorage.getItem('last_order') || localStorage.getItem('last_order') || '{}');
  const detail = document.getElementById('orderDetail');
  if (!order.id) {
    detail.innerHTML = '<p style="color:var(--text-muted);text-align:center">Tidak ada data pesanan.</p>';
    return;
  }

  const itemsHtml = (order.items || []).map(i => `
    <div class="item-row">
      <span>${i.name} × ${i.qty}${i.size ? ` • Size ${i.size}` : ''}</span>
      <span>${formatPrice(i.price * i.qty)}</span>
    </div>
  `).join('');

  const formattedDate = order.date 
    ? new Date(order.date).toLocaleString('id-ID', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      }) + ' WIB'
    : '-';

  detail.innerHTML = `
    <h3>📋 ${order.id}</h3>
    <div class="detail-row"><span>Waktu Pesanan</span><span>${formattedDate}</span></div>
    <div class="detail-row"><span>Customer</span><span>${order.customerName}</span></div>
    <div class="detail-row"><span>Email</span><span>${order.email}</span></div>
    <div class="detail-row"><span>Alamat</span><span>${order.address}</span></div>
    <div class="detail-row"><span>Pengiriman</span><span>${order.shipping?.name || '-'}</span></div>
    ${order.shipping?.resi ? `<div class="detail-row"><span>No. Resi Pengiriman</span><span style="font-weight:700; color:var(--sky-blue); letter-spacing:1px">${order.shipping.resi}</span></div>` : ''}
    <div class="detail-row"><span>Status</span><span style="color:var(--aqua)">${order.status === 'paid' ? '📦 Dikemas' : order.status === 'shipped' ? '🚚 Dikirim' : order.status === 'completed' ? '✅ Selesai' : order.status === 'pending' ? '⏳ Menunggu Pembayaran' : order.status?.toUpperCase() || '-'}</span></div>
    <div class="items-list">${itemsHtml}</div>
    <div class="detail-row"><span>Ongkos Kirim</span><span>${formatPrice(order.shipping?.price || 0)}</span></div>
    ${order.shipping?.discount ? `<div class="detail-row"><span style="color:var(--gold)">Diskon (${order.shipping.discount.code})</span><span style="color:var(--gold)">- ${formatPrice(order.shipping.discount.amount)}</span></div>` : ''}
    <div class="detail-row" style="font-weight:700"><span style="color:var(--white)">Total</span><span style="color:var(--aqua)">${formatPrice(order.total)}</span></div>
  `;

  // Clear sessionStorage after displaying to free up space
  sessionStorage.removeItem('last_order');
  sessionStorage.removeItem('last_order_id');
});
</script>
</body>
</html>
