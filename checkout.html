<!DOCTYPE html>
<!-- Presentasi: Halaman checkout untuk mengisi data pengiriman, membuat pesanan, dan mengunggah bukti pembayaran. -->
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Aika Sesilia Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .checkout-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 3rem 6rem;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 3rem;
    }
    .checkout-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 2rem;
      backdrop-filter: blur(10px);
    }
    .checkout-section h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--white);
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--card-border);
    }
    .order-summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(41,182,246,0.1);
      font-size: 0.9rem;
    }
    .order-summary-item:last-of-type { border: none; }
    .order-summary-item .item-name { color: var(--white); font-weight: 600; }
    .order-summary-item .item-qty { color: var(--text-muted); font-size: 0.8rem; }
    .order-summary-item .item-price { color: var(--aqua); font-weight: 700; }
    .order-divider { border: none; border-top: 1px solid var(--card-border); margin: 1rem 0; }
    .order-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      color: var(--text-muted);
      margin: 0.3rem 0;
    }
    .order-total-row.grand { font-size: 1.2rem; color: var(--white); font-weight: 700; }
    .order-total-row.grand span:last-child { color: var(--aqua); }
    .shipping-options { display: flex; flex-direction: column; gap: 0.8rem; }
    .shipping-option {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 1rem;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }
    .shipping-option input[type="radio"] { accent-color: var(--aqua); }
    .shipping-option:has(input:checked) { border-color: var(--aqua); background: rgba(41,182,246,0.08); }
    .shipping-option label { cursor: pointer; flex: 1; }
    .shipping-name { font-weight: 700; color: var(--white); font-size: 0.9rem; }
    .shipping-desc { font-size: 0.8rem; color: var(--text-muted); }
    .shipping-price { color: var(--aqua); font-weight: 700; font-size: 0.9rem; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      color: var(--white);
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      border-radius: 8px;
      background: rgba(3,9,31,0.8);
      border: 1px solid var(--card-border);
      color: var(--white);
      padding: 0.7rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--aqua);
      box-shadow: 0 0 10px rgba(41,182,246,0.3);
    }
    .payment-btn {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    /* Shipping Method Styling */
    .shipping-method-option {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.2rem;
      border: 2px solid var(--card-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(3,9,31,0.5);
    }
    .shipping-method-option:hover {
      border-color: rgba(41,182,246,0.5);
      background: rgba(41,182,246,0.05);
    }
    .shipping-method-option input[type="radio"] {
      accent-color: var(--aqua);
      flex-shrink: 0;
      margin-top: 0.25rem;
      cursor: pointer;
      width: 20px;
      height: 20px;
    }
    .shipping-method-option:has(input:checked) {
      border-color: var(--aqua);
      background: rgba(41,182,246,0.12);
      box-shadow: 0 0 20px rgba(41,182,246,0.25);
    }
    .shipping-method-content {
      flex: 1;
      min-width: 0;
    }
    .shipping-method-title {
      color: var(--white);
      font-weight: 700;
      font-size: 1rem;
      margin: 0 0 0.4rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .shipping-method-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.4;
      margin: 0;
    }
    label[id*="methodLabel"] { 
      transition: var(--transition) !important; 
    }
    label[id*="methodLabel"]:has(input:checked) { 
      border-color: var(--aqua) !important; 
      background: rgba(41,182,246,0.1) !important;
      box-shadow: 0 0 15px rgba(41,182,246,0.2) !important;
    }
    @media (max-width: 600px) {
      .shipping-method-option {
        padding: 1rem;
        gap: 0.8rem;
      }
      .shipping-method-title {
        font-size: 0.95rem;
      }
      .shipping-method-desc {
        font-size: 0.8rem;
      }
    }
    .empty-cart-msg {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .steps {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 0 3rem;
    }
    .step {
      flex: 1;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      position: relative;
    }
    .step::before {
      content: attr(data-n);
      display: block;
      width: 32px; height: 32px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 50%;
      line-height: 32px;
      margin: 0 auto 0.3rem;
      font-weight: 700;
    }
    .step.active::before { background: var(--sea-blue); border-color: var(--aqua); color: var(--white); }
    .step.done::before { background: var(--aqua); border-color: var(--aqua); color: var(--deep-ocean); content: '✓'; }
    @media (max-width: 800px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .checkout-section {
        padding: 1.5rem;
      }
    }
    @media (max-width: 600px) {
      .checkout-layout { 
        padding: 1rem 1.2rem 4rem;
        gap: 2rem;
      }
      .steps { padding: 0 1.2rem; }
      .checkout-section {
        padding: 1.2rem;
      }
      .checkout-section h2 {
        font-size: 1rem;
        margin-bottom: 1.2rem;
        padding-bottom: 0.8rem;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
      .shipping-method-option {
        padding: 1rem;
        gap: 0.8rem;
        border-radius: 10px;
      }
      .shipping-method-title {
        font-size: 0.95rem;
        margin-bottom: 0.3rem;
      }
      .shipping-method-desc {
        font-size: 0.75rem;
        line-height: 1.3;
      }
    }
  </style>

</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-logo">✦</span>
    <span class="brand-name">Aika Sesilia</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
  </ul>
  <div class="nav-actions">
    <button class="cart-btn" onclick="toggleCart()">🛒 <span class="cart-count" id="cartCount">0</span></button>
  </div>
</nav>

<div class="page-header">
  <p class="section-eyebrow">✦ Pembelian ✦</p>
  <h1>Checkout</h1>
</div>

<div class="steps">
  <div class="step active" data-n="1">Data Pengiriman</div>
  <div class="step" data-n="2">Pembayaran</div>
</div>

<div class="checkout-layout" id="checkoutContent">
  <!-- Filled by JS -->
</div>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<aside class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>🛒 Keranjang</h3>
    <button onclick="toggleCart()" class="cart-close">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">Total: <strong id="cartTotal">Rp 0</strong></div>
  </div>
</aside>

<footer class="footer">
  <p>© 2025 Aika Sesilia Official Store</p>
</footer>

<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
const BASE_SHIPPING = 15000; // Flat shipping rate if 'Metode Pengiriman' is removed

let availableVouchers = {};
let appliedDiscount = null;
let currentShippingRate = 12000; // Harga default awal

function normalizeVoucherCode(code) {
  return String(code || '').trim().toUpperCase();
}

async function loadVouchers() {
  try {
    const res = await fetch('/api/vouchers');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Gagal memuat voucher');

    availableVouchers = {};
    (data.vouchers || []).forEach(voucher => {
      availableVouchers[normalizeVoucherCode(voucher.code)] = voucher;
    });
  } catch (err) {
    console.error('Load vouchers error:', err);
    availableVouchers = {};
  }
}

function getAvailableVoucherSummary() {
  const vouchers = Object.values(availableVouchers);
  if (!vouchers.length) {
    return '<div style="color:var(--text-muted);font-size:0.8rem">Belum ada voucher aktif saat ini.</div>';
  }

  return vouchers.map(voucher => {
    const valueLabel = voucher.type === 'percent' ? `${voucher.value}%` : formatPrice(voucher.value);
    const minPurchase = voucher.minPurchase ? ` • Min. belanja ${formatPrice(voucher.minPurchase)}` : '';
    return `<div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.25rem"><strong style="color:var(--aqua)">${voucher.code}</strong> • ${voucher.label} (${valueLabel})${minPurchase}</div>`;
  }).join('');
}

// Simulasi Database Kota & Ongkir Standar JNE Reguler dari Jakarta Timur
// Ini menjadi bantalan (fallback) yang solid jika koneksi ke API BinderByte terputus/lambat.
const PROVINCE_TO_CITY = {
  "DKI Jakarta": [
    { name: "Jakarta Pusat", cost: 10000 },
    { name: "Jakarta Utara", cost: 10000 },
    { name: "Jakarta Barat", cost: 10000 },
    { name: "Jakarta Selatan", cost: 10000 },
    { name: "Jakarta Timur", cost: 10000 }
  ],
  "Banten": [
    { name: "Kota Tangerang", cost: 11000 },
    { name: "Kota Tangerang Selatan", cost: 11000 },
    { name: "Kab. Tangerang", cost: 12000 },
    { name: "Kota Serang", cost: 13000 }
  ],
  "Jawa Barat": [
    { name: "Kota Bekasi", cost: 11000 },
    { name: "Kota Depok", cost: 11000 },
    { name: "Kota Bogor", cost: 12000 },
    { name: "Kota Bandung", cost: 15000 },
    { name: "Kab. Bandung", cost: 16000 },
    { name: "Kota Cirebon", cost: 16000 }
  ],
  "Jawa Tengah": [
    { name: "Kota Semarang", cost: 20000 },
    { name: "Kota Surakarta (Solo)", cost: 20000 },
    { name: "Kab. Banyumas", cost: 22000 }
  ],
  "Jawa Timur": [
    { name: "Kota Surabaya", cost: 22000 },
    { name: "Kota Malang", cost: 24000 },
    { name: "Kab. Sidoarjo", cost: 24000 }
  ],
  "Luar Jawa": [
    { name: "Kota Medan", cost: 38000 },
    { name: "Kota Denpasar", cost: 35000 },
    { name: "Kota Makassar", cost: 42000 },
    { name: "Kota Balikpapan", cost: 45000 }
  ]
};

// Shipping methods
const SHIPPING_METHODS = {
  'jne': { name: 'JNE Reguler', desc: 'Pengiriman standar (5-7 hari kerja)', type: 'variable' },
  'cod_event': { name: 'COD di Event', desc: 'Ambil & bayar langsung di acara Aika', type: 'free' }
};

let currentShippingMethod = 'jne'; // Default to JNE

function loadCities() {
  const provEl = document.getElementById('provinsi');
  const kotaEl = document.getElementById('kota');
  
  if (!provEl || !kotaEl) return;
  const prov = provEl.value;

  kotaEl.innerHTML = '<option value="">-- Pilih Kota --</option>';
  
  if (prov && PROVINCE_TO_CITY[prov]) {
    kotaEl.disabled = false;
    PROVINCE_TO_CITY[prov].forEach(c => {
      kotaEl.innerHTML += `<option value="${c.cost}">${c.name}</option>`;
    });
  } else {
    kotaEl.disabled = true;
    calculateRealOngkir();
  }
}

async function calculateRealOngkir() {
  const kotaEl = document.getElementById('kota');
  if (kotaEl && kotaEl.value) {
    // Di sini seharusnya kita fetch ke /api/binderbyte.js
    // Namun API Binderbyte membutuhkan ID kota spesifik, sehingga kita pakai mockup dinamis aslinya
    // berdasarkan dropdpwn kota yang dipilih sesuai standar JNE Reguler
    currentShippingRate = parseInt(kotaEl.value, 10);
  } else {
    currentShippingRate = 12000;
  }
  updateOrderSummary();
}

function getShippingTotal() {
  if (currentShippingMethod === 'cod_event') {
    return 0; // COD di Event adalah gratis ongkir
  }
  return currentShippingRate; // JNE rate dari kota
}

function updateShippingMethod(method) {
  currentShippingMethod = method;
  
  // Update UI: hide/show JNE section
  const jneSection = document.getElementById('jneShippingSection');
  const provinsiField = document.getElementById('provinsi');
  const kotaField = document.getElementById('kota');
  
  if (method === 'jne') {
    jneSection.style.display = 'block';
    provinsiField.required = true;
    kotaField.required = true;
  } else if (method === 'cod_event') {
    jneSection.style.display = 'none';
    provinsiField.required = false;
    kotaField.required = false;
    // Clear province/city selection
    provinsiField.value = '';
    kotaField.value = '';
  }
  
  updateOrderSummary();
}

function handleAddressChange() {
  // Hanya simpan state. Ongkir sekarang dihandle oleh Dropdown.
}

function getDiscountAmount() {
  if (!appliedDiscount) return 0;
  const subtotal = Cart.total();
  let discountAmt = 0;
  if (appliedDiscount.type === 'percent') {
    discountAmt = (subtotal * appliedDiscount.value) / 100;
  } else if (appliedDiscount.type === 'fixed') {
    discountAmt = appliedDiscount.value;
  }

  if (appliedDiscount.maxDiscount && discountAmt > appliedDiscount.maxDiscount) {
    discountAmt = appliedDiscount.maxDiscount;
  }
  
  // Cap at subtotal + shipping
  const shipping = getShippingTotal();
  if (discountAmt > subtotal + shipping) discountAmt = subtotal + shipping;
  return discountAmt;
}

function getGrandTotal() {
  const subtotal = Cart.total();
  const shipping = getShippingTotal();
  const discountAmt = getDiscountAmount();
  return subtotal + shipping - discountAmt;
}

function applyDiscount() {
  const codeEl = document.getElementById('discountCode');
  const msgEl = document.getElementById('discountMessage');
  const code = normalizeVoucherCode(codeEl.value);

  if (!code) {
    msgEl.innerHTML = '<span style="color: #ff5252;">Masukkan kode diskon!</span>';
    return;
  }

  const voucher = availableVouchers[code];
  const subtotal = Cart.total();

  if (voucher) {
    if (voucher.minPurchase && subtotal < voucher.minPurchase) {
      appliedDiscount = null;
      msgEl.innerHTML = `<span style="color: #ff5252;">Minimal belanja untuk voucher ini adalah ${formatPrice(voucher.minPurchase)}.</span>`;
    } else {
      appliedDiscount = { ...voucher, code };
      msgEl.innerHTML = `<span style="color: var(--gold);">🎉 Kode ${code} berhasil diterapkan! (${appliedDiscount.label})</span>`;
      showToast('🎉 Kode diskon diterapkan!');
    }
  } else {
    appliedDiscount = null;
    msgEl.innerHTML = '<span style="color: #ff5252;">Kode diskon tidak valid atau kadaluarsa.</span>';
  }
  updateOrderSummary();
}

function updateOrderSummary() {
  const subtotal = Cart.total();
  const shipping = getShippingTotal();
  const grand = getGrandTotal();
  const discountAmt = getDiscountAmount();

  const discountRow = document.getElementById('discountRow');
  if (appliedDiscount) {
    discountRow.innerHTML = `<span>Diskon (${appliedDiscount.label})</span><span style="color: var(--gold);">- ${formatPrice(discountAmt)}</span>`;
    discountRow.style.display = 'flex';
  } else {
    discountRow.style.display = 'none';
  }

  document.getElementById('shippingRow').innerHTML = `<span>Ongkos Kirim</span><span>${formatPrice(shipping)}</span>`;
  document.getElementById('grandTotal').innerHTML = `<span>Total</span><span>${formatPrice(grand)}</span>`;
}

function renderCheckout() {
  const items = Cart.items;
  const content = document.getElementById('checkoutContent');

  if (items.length === 0) {
    content.innerHTML = `
      <div class="empty-cart-msg" style="grid-column:1/-1">
        <p style="font-size:3rem">🛒</p>
        <p>Keranjangmu kosong!</p>
        <a href="shop.html" class="btn-primary" style="margin-top:1rem">Lihat Produk</a>
      </div>`;
    return;
  }

  const subtotal = Cart.total();
  const shipping = getShippingTotal();
  const grand = getGrandTotal();

  content.innerHTML = `
    <!-- LEFT: FORM -->
    <div>
      <div class="checkout-section" style="margin-bottom:1.5rem">
        <h2>📦 Data Pengiriman</h2>
        <div id="addressOptions" style="margin-bottom:1rem;"></div>
        
        <!-- Shipping Method Selection -->
        <div class="form-group" style="margin-bottom:2rem;">
          <label style="display:block; margin-bottom:1rem; font-weight:700; font-size:0.95rem; color:var(--white);">🚚 Metode Pengiriman *</label>
          <div style="display:flex; flex-direction:column; gap:1rem;">
            <label class="shipping-method-option" id="methodJneLabel" style="border:2px solid var(--card-border);">
              <input type="radio" name="shippingMethod" value="jne" checked onchange="updateShippingMethod('jne')" />
              <div class="shipping-method-content">
                <p class="shipping-method-title">📬 JNE Reguler</p>
                <p class="shipping-method-desc">Pengiriman Langsung di Kirim Oleh Aika</p>
              </div>
            </label>
            <label class="shipping-method-option" id="methodCodLabel" style="border:2px solid var(--card-border);">
              <input type="radio" name="shippingMethod" value="cod_event" onchange="updateShippingMethod('cod_event')" />
              <div class="shipping-method-content">
                <p class="shipping-method-title">🎪 COD di Event</p>
                <p class="shipping-method-desc">Ambil langsung Barang saat Event (GRATIS ongkir)</p>
              </div>
            </label>
          </div>
        </div>

        <!-- Shipping Location (only for JNE) -->
        <div id="jneShippingSection" style="display:block;">
          <div class="form-row">
            <div class="form-group">
              <label>Provinsi *</label>
              <select id="provinsi" onchange="loadCities()" required>
                <option value="">-- Pilih Provinsi --</option>
                <option value="DKI Jakarta">DKI Jakarta</option>
                <option value="Jawa Barat">Jawa Barat</option>
                <option value="Jawa Tengah">Jawa Tengah</option>
                <option value="Jawa Timur">Jawa Timur</option>
                <option value="Banten">Banten</option>
                <option value="Luar Jawa">Luar Pulau Jawa (Lainnya)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Kota/Kabupaten *</label>
              <select id="kota" onchange="calculateRealOngkir()" required disabled>
                <option value="">-- Pilih Kota --</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Diterima Oleh (Nama) *</label>
            <input type="text" id="fullName" placeholder="Nama penerima" required />
          </div>
          <div class="form-group">
            <label>No. HP *</label>
            <input type="tel" id="phone" placeholder="08xxxxxxxxxx" required />
          </div>
        </div>

        <div class="form-group">
          <label>Alamat Lengkap *</label>
          <textarea id="address" oninput="handleAddressChange()" rows="3" placeholder="Nama jalan, nomor, RT/RW, Kecamatan, Kota, Provinsi..." style="width:100%; border-radius:8px; background:rgba(3,9,31,0.8); border:1px solid var(--card-border); color:var(--white); padding:0.8rem; font-family:var(--font-body); resize:none;" required></textarea>
        </div>
        <div class="form-group">
          <label>Catatan Pesanan (opsional)</label>
          <input type="text" id="note" placeholder="Catatan untuk penjual/kurir..." />
        </div>
      </div>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div>
      <div class="checkout-section" style="position:sticky;top:100px">
        <h2>🛍️ Ringkasan Pesanan</h2>
        ${items.map(item => `
          <div class="order-summary-item">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-qty">× ${item.qty}</div>
            </div>
            <div class="item-price">${formatPrice(item.price * item.qty)}</div>
          </div>
        `).join('')}
        <hr class="order-divider">

        <!-- Discount Code Input -->
        <div style="display:flex; gap:0.5rem; margin-bottom:0.5rem;">
          <input type="text" id="discountCode" placeholder="Kode Promo (opsional)" style="flex:1; border-radius:8px; border:1px solid var(--card-border); background:rgba(3,9,31,0.6); padding:0.5rem 1rem; color:var(--white);" />
          <button class="btn-primary" onclick="applyDiscount()" style="padding: 0.5rem 1rem; font-size:0.85rem">Terapkan</button>
        </div>
        <div style="margin-bottom:0.75rem">${getAvailableVoucherSummary()}</div>

}

const SUPPORTED_PROOF_TYPES = ['image/jpeg', 'image/png', 'image/webp'];
const MAX_PROOF_SIZE_BYTES = 5 * 1024 * 1024;
const MAX_PROOF_DIMENSION = 1600;

function setProofUploadState({ dataUrl = '', message = '', isReady = false } = {}) {
  const preview = document.getElementById('proofPreview');
  const submitBtn = document.getElementById('submitPaymentBtn');

  window.selectedProofData = dataUrl || null;
  preview.innerHTML = message ? `
      <div style="border:1px solid var(--card-border);border-radius:8px;padding:1rem;">
        ${dataUrl ? `<img src="${dataUrl}" style="max-width:100%;height:auto;border-radius:4px;margin-bottom:0.5rem;" />` : ''}
        <p style="margin:0.5rem 0 0 0;font-size:0.85rem;color:var(--text-muted);">${message}</p>
      </div>
    ` : '';
  submitBtn.style.display = isReady ? 'block' : 'none';
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = () => reject(new Error('Gagal membaca file gambar'));
    reader.readAsDataURL(file);
  });
}

function canvasToJpegBlob(canvas, quality = 0.85) {
  return new Promise((resolve, reject) => {
    canvas.toBlob((blob) => {
      if (!blob) {
        reject(new Error('Gagal memproses gambar'));
        return;
      }
      resolve(blob);
    }, 'image/jpeg', quality);
  });
}

async function normalizeProofImage(file) {
  if (!file.type || !file.type.startsWith('image/')) {
    throw new Error('File harus berupa gambar');
  }

  if (SUPPORTED_PROOF_TYPES.includes(file.type) && file.size <= MAX_PROOF_SIZE_BYTES) {
    return {
      dataUrl: await readFileAsDataUrl(file),
      wasConverted: false
    };
  }

  const objectUrl = URL.createObjectURL(file);

  try {
    const img = await new Promise((resolve, reject) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = () => reject(new Error('Format gambar belum didukung. Gunakan JPG, PNG, atau WebP.'));
      image.src = objectUrl;
    });

    const width = img.naturalWidth || img.width || 1;
    const height = img.naturalHeight || img.height || 1;
    const scale = Math.min(1, MAX_PROOF_DIMENSION / Math.max(width, height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.max(1, Math.round(width * scale));
    canvas.height = Math.max(1, Math.round(height * scale));

    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const blob = await canvasToJpegBlob(canvas);
    if (blob.size > MAX_PROOF_SIZE_BYTES) {
      throw new Error('Ukuran gambar terlalu besar. Coba kirim screenshot yang lebih kecil.');
    }

    return {
      dataUrl: await readFileAsDataUrl(blob),
      wasConverted: true
    };
  } finally {
    URL.revokeObjectURL(objectUrl);
  }
}

async function handleProofUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  setProofUploadState();

  if (file.size > 10 * 1024 * 1024) {
    showToast('File terlalu besar. Maksimal 10MB sebelum diproses.');
    event.target.value = '';
    return;
  }

  setProofUploadState({ message: 'Memproses gambar...' });

  try {
    const { dataUrl, wasConverted } = await normalizeProofImage(file);
    setProofUploadState({
      dataUrl,
      message: wasConverted
        ? 'File siap dikirim. Gambar otomatis disesuaikan ke format yang didukung.'
        : 'File siap dikirim.',
      isReady: true
    });
  } catch (err) {
    event.target.value = '';
    setProofUploadState();
    showToast(err.message || 'Gagal memproses file bukti transfer');
  }

}

async function submitPaymentProof() {
  if (!window.selectedProofData) {
    showToast('❌ Pilih file bukti transfer terlebih dahulu');
    return;
  }
  
  if (!validateForm()) return;

  const customerName = document.getElementById('fullName').value;
  const userSession = JSON.parse(localStorage.getItem('aika_session') || sessionStorage.getItem('aika_session') || '{}');
  const email = userSession.email || 'customer@guest.com';
  const phone = document.getElementById('phone').value;
  const address = document.getElementById('address').value;
  const note = document.getElementById('note').value;
  
  let fullDest = address;
  
  // For JNE shipment, add city and province info
  if (currentShippingMethod === 'jne') {
    const provEl = document.getElementById('provinsi');
    const kotaEl = document.getElementById('kota');
    const selectedKota = kotaEl && kotaEl.selectedIndex > 0 ? kotaEl.options[kotaEl.selectedIndex].text : '';
    fullDest = `${address}, ${selectedKota}, ${provEl?.value || ''}`;
  }

  const subtotal = Cart.total();
  const grand = getGrandTotal();
  const discountAmt = getDiscountAmount();
  const discountCode = appliedDiscount ? appliedDiscount.code : null;

  const orderData = {
    customerName, email, phone, address: fullDest, note,
    items: [...Cart.items],
    shipping: { 
      method: currentShippingMethod,
      id: currentShippingMethod === 'jne' ? 'jne_reg' : 'cod_event',
      name: currentShippingMethod === 'jne' ? 'JNE Reguler' : 'COD di Event',
      price: getShippingTotal(),
      discount: discountAmt > 0 ? { code: discountCode, amount: discountAmt } : null
    },
    subtotal, total: grand
  };

  // Step 1: Buat order di database
  showToast('⏳ Membuat pesanan...');
  let order;
  try {
    order = await Orders.add(orderData);
  } catch (err) {
    showToast('❌ Gagal membuat pesanan');
    return;
  }

  // Step 2: Upload bukti transfer
  showToast('⏳ Mengunggah bukti transfer...');
  try {
    const paymentRes = await fetch('/api/payment-proof', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        orderId: order.id,
        email: email,
        customerName: customerName,
        base64Image: window.selectedProofData
      })
    });

    if (!paymentRes.ok) {
      const errData = await paymentRes.json();
      showToast('❌ ' + (errData.error || 'Gagal mengunggah bukti'));
      return;
    }

    const paymentResult = await paymentRes.json();
    console.log('✅ Payment proof uploaded:', paymentResult);
    
    // Clear cart
    Cart.clear();
    
    // Clean up old storage data to prevent quota exceeded error
    try {
      // Remove old invoice data
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && (key.includes('last_order') || key.includes('invoice') || key.includes('payment'))) {
          keysToRemove.push(key);
        }
      }
      keysToRemove.forEach(key => localStorage.removeItem(key));
    } catch(e) { console.warn('Cleanup error:', e); }
    
    // Store order in sessionStorage (without base64 images)
    const orderForStorage = { ...order, status: 'payment_pending' };
    delete orderForStorage.payment_proof; // Don't store large image
    try {
      sessionStorage.setItem('last_order', JSON.stringify(orderForStorage));
    } catch(e) {
      console.warn('SessionStorage full:', e);
    }
    
    closePaymentModal();
    showToast('✅ Pesanan dibuat! Silakan lengkapi pembayaran.');
    
    // Redirect ke order success
    setTimeout(() => {
      window.location.href = 'order-success.html';
    }, 1500);

  } catch (err) {
    showToast('❌ Error: ' + err.message);
    console.error(err);
  }
}

function validateForm() {
  const required = ['fullName', 'phone', 'address'];
  
  // Add province and city to required if JNE method is selected
  if (currentShippingMethod === 'jne') {
    required.push('provinsi', 'kota');
  }
  
  for (const id of required) {
    const el = document.getElementById(id);
    if (!el || !el.value.trim()) {
      showToast('⚠ Mohon lengkapi semua data pengiriman!');
      el && el.focus();
      return false;
    }
  }
  return true;
}



document.addEventListener('DOMContentLoaded', async () => {
  await Cart.load();
  await loadVouchers();
  renderCheckout();


  // Auto-fill user data & Add Address Book Options
  const userStr = localStorage.getItem('aika_session') || sessionStorage.getItem('aika_session');
  if (userStr) {
    const user = JSON.parse(userStr);
    
    // Auto-fill full name field
    const fullNameInput = document.getElementById('fullName');
    if(fullNameInput) fullNameInput.value = user.username;

    // Load Addresses from LocalStorage (from dashboard/profile)
    const userAddresses = JSON.parse(localStorage.getItem('aika_address_' + user.email) || '[]');
    const addressOptionsContainer = document.getElementById('addressOptions');
    
    if (userAddresses.length > 0 && addressOptionsContainer) {
      let optionsHtml = `<label style="color:var(--white); font-weight:700; margin-bottom:10px; display:block; font-size:0.9rem;">Pilih dari Buku Alamat:</label>`;
      optionsHtml += `<div style="display:flex; flex-direction:column; gap:0.8rem; margin-bottom:1rem;">`;
      
      userAddresses.forEach((addr, idx) => {
        optionsHtml += `
          <label style="display:flex; align-items:flex-start; gap:10px; background:rgba(3,9,31,0.5); padding:1rem; border:1px solid var(--card-border); border-radius:var(--radius-sm); cursor:pointer;">
            <input type="radio" name="savedAddr" value="${idx}" onchange="useAddress(${idx})" style="margin-top:4px; accent-color:var(--aqua);">
            <div>
              <strong style="color:var(--aqua); display:block; margin-bottom:5px;">${addr.label}</strong>
              <span style="color:var(--text-muted); font-size:0.85rem; line-height:1.4;">${addr.address}</span>
            </div>
          </label>
        `;
      });
      optionsHtml += `</div>`;
      addressOptionsContainer.innerHTML = optionsHtml;
    }
  }
});

// Function to populate address textarea based on selection
function useAddress(idx) {
  const userStr = localStorage.getItem('aika_session') || sessionStorage.getItem('aika_session');
  if (!userStr) return;
  const user = JSON.parse(userStr);
  const addresses = JSON.parse(localStorage.getItem('aika_address_' + user.email) || '[]');
  
  if(addresses[idx]) {
    document.getElementById('address').value = addresses[idx].address;
    document.getElementById('provinsi').focus();
    showToast('⚠️ Lengkapi juga pilihan Provinsi dan Kota Anda untuk menghitung ongkir.');
  }
}
