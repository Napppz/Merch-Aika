<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Aika Sesilia Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Midtrans Snap.js -->
  <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="YOUR_MIDTRANS_CLIENT_KEY"></script>
  <style>
    .checkout-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 3rem 6rem;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 3rem;
    }
    .checkout-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 2rem;
      backdrop-filter: blur(10px);
    }
    .checkout-section h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--white);
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--card-border);
    }
    .order-summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(41,182,246,0.1);
      font-size: 0.9rem;
    }
    .order-summary-item:last-of-type { border: none; }
    .order-summary-item .item-name { color: var(--white); font-weight: 600; }
    .order-summary-item .item-qty { color: var(--text-muted); font-size: 0.8rem; }
    .order-summary-item .item-price { color: var(--aqua); font-weight: 700; }
    .order-divider { border: none; border-top: 1px solid var(--card-border); margin: 1rem 0; }
    .order-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      color: var(--text-muted);
      margin: 0.3rem 0;
    }
    .order-total-row.grand { font-size: 1.2rem; color: var(--white); font-weight: 700; }
    .order-total-row.grand span:last-child { color: var(--aqua); }
    .shipping-options { display: flex; flex-direction: column; gap: 0.8rem; }
    .shipping-option {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 1rem;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }
    .shipping-option input[type="radio"] { accent-color: var(--aqua); }
    .shipping-option:has(input:checked) { border-color: var(--aqua); background: rgba(41,182,246,0.08); }
    .shipping-option label { cursor: pointer; flex: 1; }
    .shipping-name { font-weight: 700; color: var(--white); font-size: 0.9rem; }
    .shipping-desc { font-size: 0.8rem; color: var(--text-muted); }
    .shipping-price { color: var(--aqua); font-weight: 700; font-size: 0.9rem; }
    .payment-btn {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .midtrans-logo { font-size: 0.7rem; opacity: 0.7; margin-top: 0.5rem; text-align: center; color: var(--text-muted); }
    .empty-cart-msg {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .steps {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 0 3rem;
    }
    .step {
      flex: 1;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      position: relative;
    }
    .step::before {
      content: attr(data-n);
      display: block;
      width: 32px; height: 32px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 50%;
      line-height: 32px;
      margin: 0 auto 0.3rem;
      font-weight: 700;
    }
    .step.active::before { background: var(--sea-blue); border-color: var(--aqua); color: var(--white); }
    .step.done::before { background: var(--aqua); border-color: var(--aqua); color: var(--deep-ocean); content: '✓'; }
    @media (max-width: 800px) {
      .checkout-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .checkout-layout { padding: 1rem 1.2rem 4rem; }
      .steps { padding: 0 1.2rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-logo">✦</span>
    <span class="brand-name">Aika Sesilia</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
  </ul>
  <div class="nav-actions">
    <button class="cart-btn" onclick="toggleCart()">🛒 <span class="cart-count" id="cartCount">0</span></button>
  </div>
</nav>

<div class="page-header">
  <p class="section-eyebrow">✦ Pembelian ✦</p>
  <h1>Checkout</h1>
</div>

<div class="steps">
  <div class="step active" data-n="1">Data Pengiriman</div>
  <div class="step" data-n="2">Metode Pengiriman</div>
  <div class="step" data-n="3">Pembayaran</div>
</div>

<div class="checkout-layout" id="checkoutContent">
  <!-- Filled by JS -->
</div>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<aside class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>🛒 Keranjang</h3>
    <button onclick="toggleCart()" class="cart-close">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">Total: <strong id="cartTotal">Rp 0</strong></div>
  </div>
</aside>

<footer class="footer">
  <p>© 2025 Aika Sesilia Official Store</p>
</footer>

<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
const SHIPPING_OPTIONS = [
  { id: 'jne_reg', name: 'JNE REG', desc: '2-4 hari kerja', price: 15000 },
  { id: 'jnt_express', name: 'J&T Express', desc: '1-3 hari kerja', price: 18000 },
  { id: 'sicepat', name: 'SiCepat BEST', desc: '1-2 hari kerja', price: 22000 },
  { id: 'gosend', name: 'GoSend Same Day', desc: 'Hari ini (Jabodetabek)', price: 35000 },
];

let selectedShipping = SHIPPING_OPTIONS[0];

function getShippingTotal() {
  return selectedShipping ? selectedShipping.price : 0;
}

function renderCheckout() {
  const items = Cart.items;
  const content = document.getElementById('checkoutContent');

  if (items.length === 0) {
    content.innerHTML = `
      <div class="empty-cart-msg" style="grid-column:1/-1">
        <p style="font-size:3rem">🛒</p>
        <p>Keranjangmu kosong!</p>
        <a href="shop.html" class="btn-primary" style="margin-top:1rem">Lihat Produk</a>
      </div>`;
    return;
  }

  const subtotal = Cart.total();
  const shipping = getShippingTotal();
  const grand = subtotal + shipping;

  content.innerHTML = `
    <!-- LEFT: FORM -->
    <div>
      <div class="checkout-section" style="margin-bottom:1.5rem">
        <h2>📦 Data Pengiriman</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Nama Depan *</label>
            <input type="text" id="firstName" placeholder="Nama depan" required />
          </div>
          <div class="form-group">
            <label>Nama Belakang *</label>
            <input type="text" id="lastName" placeholder="Nama belakang" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" placeholder="email@contoh.com" required />
          </div>
          <div class="form-group">
            <label>No. HP *</label>
            <input type="tel" id="phone" placeholder="08xxxxxxxxxx" required />
          </div>
        </div>
        <div class="form-group">
          <label>Alamat Lengkap *</label>
          <input type="text" id="address" placeholder="Nama jalan, nomor, RT/RW..." required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Kota *</label>
            <input type="text" id="city" placeholder="Kota/Kabupaten" required />
          </div>
          <div class="form-group">
            <label>Provinsi *</label>
            <select id="province">
              <option value="">Pilih Provinsi</option>
              <option>DKI Jakarta</option>
              <option>Jawa Barat</option>
              <option>Jawa Tengah</option>
              <option>Jawa Timur</option>
              <option>Bali</option>
              <option>Sumatera Utara</option>
              <option>Sulawesi Selatan</option>
              <option>Kalimantan Timur</option>
              <option>DIY Yogyakarta</option>
              <option>Banten</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Kode Pos *</label>
          <input type="text" id="postal" placeholder="12345" maxlength="5" />
        </div>
        <div class="form-group">
          <label>Catatan Pesanan (opsional)</label>
          <input type="text" id="note" placeholder="Catatan untuk penjual..." />
        </div>
      </div>

      <div class="checkout-section">
        <h2>🚚 Metode Pengiriman</h2>
        <div class="shipping-options" id="shippingOptions">
          ${SHIPPING_OPTIONS.map((s, i) => `
            <label class="shipping-option">
              <input type="radio" name="shipping" value="${s.id}" ${i === 0 ? 'checked' : ''} onchange="selectShipping('${s.id}')" />
              <div style="flex:1">
                <div class="shipping-name">${s.name}</div>
                <div class="shipping-desc">${s.desc}</div>
              </div>
              <div class="shipping-price">${formatPrice(s.price)}</div>
            </label>
          `).join('')}
        </div>
      </div>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div>
      <div class="checkout-section" style="position:sticky;top:100px">
        <h2>🛍️ Ringkasan Pesanan</h2>
        ${items.map(item => `
          <div class="order-summary-item">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-qty">× ${item.qty}</div>
            </div>
            <div class="item-price">${formatPrice(item.price * item.qty)}</div>
          </div>
        `).join('')}
        <hr class="order-divider">
        <div class="order-total-row">
          <span>Subtotal</span><span>${formatPrice(subtotal)}</span>
        </div>
        <div class="order-total-row" id="shippingRow">
          <span>Ongkos Kirim</span><span>${formatPrice(shipping)}</span>
        </div>
        <hr class="order-divider">
        <div class="order-total-row grand" id="grandTotal">
          <span>Total</span><span>${formatPrice(grand)}</span>
        </div>

        <button class="btn-primary payment-btn" onclick="processPayment()">
          💳 Bayar Sekarang
        </button>
        <div class="midtrans-logo">Pembayaran aman via Midtrans</div>
        <div style="display:flex;gap:0.5rem;justify-content:center;margin-top:0.8rem;flex-wrap:wrap">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Mastercard-logo.svg/64px-Mastercard-logo.svg.png" height="20" alt="Mastercard" title="Mastercard">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" height="20" alt="Visa" title="Visa">
          <span style="font-size:0.75rem;color:var(--text-muted);align-self:center">GoPay • OVO • DANA • BCA • BNI • dll</span>
        </div>
      </div>
    </div>
  `;
}

function selectShipping(id) {
  selectedShipping = SHIPPING_OPTIONS.find(s => s.id === id);
  const subtotal = Cart.total();
  const grand = subtotal + selectedShipping.price;
  const shippingRow = document.getElementById('shippingRow');
  const grandTotal = document.getElementById('grandTotal');
  if (shippingRow) shippingRow.querySelector('span:last-child').textContent = formatPrice(selectedShipping.price);
  if (grandTotal) grandTotal.querySelector('span:last-child').textContent = formatPrice(grand);
}

function validateForm() {
  const required = ['firstName', 'lastName', 'email', 'phone', 'address', 'city', 'province', 'postal'];
  for (const id of required) {
    const el = document.getElementById(id);
    if (!el || !el.value.trim()) {
      showToast('⚠ Mohon lengkapi semua data pengiriman!');
      el && el.focus();
      return false;
    }
  }
  return true;
}

function processPayment() {
  if (!validateForm()) return;

  const customerName = `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const address = `${document.getElementById('address').value}, ${document.getElementById('city').value}, ${document.getElementById('province').value} ${document.getElementById('postal').value}`;
  const note = document.getElementById('note').value;
  const subtotal = Cart.total();
  const grand = subtotal + getShippingTotal();

  const orderData = {
    customerName, email, phone, address, note,
    items: [...Cart.items],
    shipping: selectedShipping,
    subtotal, total: grand
  };

  // Save initial order
  let order;
  try {
    order = await Orders.add(orderData);
  } catch (err) {
    showToast('Gagal memproses pesanan. Coba lagi.');
    return;
  }
  localStorage.setItem('last_order', JSON.stringify(order));

  // ==== MIDTRANS INTEGRATION ====
  // In production: call your backend to get snap_token from Midtrans API
  // Your backend should call: POST https://app.sandbox.midtrans.com/snap/v1/transactions
  // Then return the token to frontend.
  //
  // Demo simulation (replace with real backend call):

  showToast('⏳ Memproses pembayaran...');

  // PRODUCTION: Call your backend
  // fetch('/api/create-transaction', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify({ order_id: order.id, gross_amount: grand, customer: { name: customerName, email, phone } })
  // })
  // .then(r => r.json())
  // .then(({ token }) => {
  //   snap.pay(token, {
  //     onSuccess: async function(result) {
  //       await Orders.update(order.id, { status: 'paid', payment: result });
  //       Cart.clear();
  //       window.location.href = 'order-success.html?id=' + order.id;
  //     },
  //     onPending: async function(result) {
  //       await Orders.update(order.id, { status: 'pending_payment', payment: result });
  //       Cart.clear();
  //       window.location.href = 'order-success.html?id=' + order.id;
  //     },
  //     onError(result) { showToast('❌ Pembayaran gagal. Silakan coba lagi.'); console.error(result); },
  //     onClose() { showToast('⚠ Pembayaran dibatalkan.'); }
  //   });
  // });

  // DEMO: Simulate snap popup
  setTimeout(() => {
    const confirmed = confirm(
      `🛒 DEMO MIDTRANS SANDBOX\n\n` +
      `Order: ${order.id}\n` +
      `Customer: ${customerName}\n` +
      `Total: ${formatPrice(grand)}\n\n` +
      `✅ Klik OK untuk simulasi pembayaran berhasil\n` +
      `❌ Klik Cancel untuk simulasi pending\n\n` +
      `(Pada production, ini akan membuka popup Midtrans Snap)`
    );
    if (confirmed) {
      handlePaymentSuccess(order, { transaction_id: 'TXN-' + Date.now(), payment_type: 'demo' });
    } else {
      handlePaymentPending(order, { transaction_id: 'TXN-' + Date.now() });
    }
  }, 1500);
}

async function handlePaymentSuccess(order, result) {
  await Orders.update(order.id, { status: 'paid', payment: result });
  Cart.clear();
  localStorage.setItem('last_order', JSON.stringify({ ...order, status: 'paid', payment: result }));
  window.location.href = 'order-success.html';
}

async function handlePaymentPending(order, result) {
  await Orders.update(order.id, { status: 'pending_payment', payment: result });
  showToast('⏳ Pembayaran pending. Selesaikan pembayaranmu!');
}

document.addEventListener('DOMContentLoaded', () => {
  Cart.updateUI();
  renderCheckout();
});
</script>
</body>
</html>
