<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Aika Sesilia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(21,101,192,0.2), transparent 70%);
      pointer-events: none;
    }
    .login-card {
      width: 420px;
      max-width: 95vw;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-blue), 0 0 80px rgba(41,182,246,0.1);
      position: relative;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo .brand-logo {
      font-size: 2.5rem;
      display: block;
      color: var(--aqua);
      animation: spin 8s linear infinite;
    }
    .login-logo h1 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--white);
      margin: 0.5rem 0 0.2rem;
    }
    .login-logo p { color: var(--text-muted); font-size: 0.85rem; }
    .login-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-sm);
      padding: 0.8rem 1rem;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 3rem; }
    .toggle-pw {
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      transition: var(--transition);
    }
    .toggle-pw:hover { color: var(--aqua); }
    .login-hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--card-border);
    }
    .login-hint strong { color: var(--aqua); }
    a.back-link {
      display: block;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
      margin-top: 1rem;
      transition: var(--transition);
    }
    a.back-link:hover { color: var(--aqua); }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <span class="brand-logo">✦</span>
    <h1>Admin Panel</h1>
    <p>Aika Sesilia Merch Store</p>
  </div>

  <div class="login-error" id="loginError">⚠ Username atau password salah!</div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="password-wrap">
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
      <button class="toggle-pw" type="button" onclick="togglePw()" id="pwToggle">👁</button>
    </div>
  </div>

  <button class="btn-primary w100" onclick="doLogin()" style="padding:1rem;font-size:1rem">
    Masuk →
  </button>

  <div class="login-hint">
    Demo credentials:<br>
    Username: <strong>aika</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong>
  </div>
  <a href="../index.html" class="back-link">← Kembali ke Toko</a>
</div>

<script>
  // Simple demo auth — replace with real backend auth in production
  const ADMIN_CREDENTIALS = { username: 'aika', password: 'admin123' };

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('loginError');

    if (u === ADMIN_CREDENTIALS.username && p === ADMIN_CREDENTIALS.password) {
      sessionStorage.setItem('aika_admin', 'true');
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'block';
      document.getElementById('password').value = '';
      setTimeout(() => err.style.display = 'none', 4000);
    }
  }

  function togglePw() {
    const pw = document.getElementById('password');
    const btn = document.getElementById('pwToggle');
    if (pw.type === 'password') { pw.type = 'text'; btn.textContent = '🙈'; }
    else { pw.type = 'password'; btn.textContent = '👁'; }
  }

  // Already logged in?
  if (sessionStorage.getItem('aika_admin') === 'true') {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
