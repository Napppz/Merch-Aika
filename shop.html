<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Aika Sesilia Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .shop-layout { max-width: 1300px; margin: 0 auto; padding: 2rem 3rem 6rem; }
    .shop-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      padding: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      background: rgba(3,9,31,0.6);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      padding: 0.7rem 1.2rem;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: var(--transition);
    }
    .search-box:focus { border-color: var(--aqua); }
    .filter-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-tab {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .filter-tab.active, .filter-tab:hover {
      background: var(--sea-blue);
      border-color: var(--sea-blue);
      color: var(--white);
    }
    .product-count { color: var(--text-muted); font-size: 0.85rem; margin-left: auto; }
  </style>
</head>
<body>
<div class="cursor-glow"></div>

<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-logo">✦</span>
    <span class="brand-name">Aika Sesilia</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html" class="active">Shop</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <div class="nav-actions">
    <button class="cart-btn" onclick="toggleCart()">
      🛒 <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<div class="page-header">
  <p class="section-eyebrow">✦ Official Merchandise ✦</p>
  <h1>Semua Produk</h1>
  <p>Koleksi eksklusif langsung dari Aika Sesilia</p>
</div>

<div class="shop-layout">
  <div class="shop-controls">
    <input type="text" class="search-box" placeholder="🔍 Cari produk..." id="searchInput" oninput="applyFilter()" />
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" onclick="setFilter('Semua', this)">Semua</button>
      <button class="filter-tab" onclick="setFilter('Pakaian', this)">👕 Pakaian</button>
      <button class="filter-tab" onclick="setFilter('Aksesoris', this)">💎 Aksesoris</button>
      <button class="filter-tab" onclick="setFilter('Foto & Print', this)">🖼️ Foto & Print</button>
      <button class="filter-tab" onclick="setFilter('Stiker', this)">✨ Stiker</button>
    </div>
    <span class="product-count" id="productCount"></span>
  </div>

  <div class="product-grid" id="shopGrid">
    <div class="loading-placeholder">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>© 2025 Aika Sesilia Official Store. All rights reserved.</p>
</footer>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<aside class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>🛒 Keranjang</h3>
    <button onclick="toggleCart()" class="cart-close">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">Total: <strong id="cartTotal">Rp 0</strong></div>
    <button class="btn-primary w100" onclick="window.location.href='checkout.html'">Checkout →</button>
  </div>
</aside>

<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
  let currentFilter = 'Semua';

  function setFilter(cat, el) {
    currentFilter = cat;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    applyFilter();
  }

  function applyFilter() {
    const search = document.getElementById('searchInput').value;
    loadShopProducts(currentFilter, search);
    const all = Products.getAll();
    let filtered = all;
    if (currentFilter !== 'Semua') filtered = filtered.filter(p => p.category === currentFilter);
    if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
    document.getElementById('productCount').textContent = `${filtered.length} produk`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadShopProducts();
    applyFilter();
  });
</script>
</body>
</html>
