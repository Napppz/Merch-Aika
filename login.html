<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — Aika Sesilia</title>
  <meta name="description" content="Masuk ke akun Aika Sesilia kamu untuk berbelanja lebih mudah dan melihat riwayat pesanan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 20%, rgba(21,101,192,0.25), transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(41,182,246,0.1), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Stars */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--aqua);
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:.8;transform:scale(1.2)} }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
    }

    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-blue), 0 0 80px rgba(41,182,246,0.08);
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--sea-blue), var(--aqua), var(--sea-blue));
      background-size: 200% 100%;
      animation: shimmerBar 3s linear infinite;
    }
    @keyframes shimmerBar { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo .brand-logo {
      font-size: 2.8rem;
      display: block;
      color: var(--aqua);
      animation: spin 8s linear infinite;
    }
    .auth-logo h1 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--white);
      margin: 0.6rem 0 0.2rem;
    }
    .auth-logo p { color: var(--text-muted); font-size: 0.85rem; }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(3,9,31,0.4);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
      border: 1px solid var(--card-border);
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      border-radius: 9px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
      border: none;
      background: transparent;
      font-family: var(--font-body);
    }
    .auth-tab.active {
      background: var(--sea-blue);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(21,101,192,0.4);
    }
    .auth-tab:hover:not(.active) { color: var(--aqua); }

    /* Input with icon */
    .input-icon-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 1rem; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.6;
    }
    .input-icon-wrap input { padding-left: 2.8rem !important; }

    /* Password toggle */
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 3rem !important; }
    .toggle-pw {
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      transition: var(--transition);
    }
    .toggle-pw:hover { color: var(--aqua); }

    /* Alert */
    .auth-alert {
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      animation: fadeUp 0.3s ease;
      display: none;
    }
    .auth-alert.error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      display: block;
    }
    .auth-alert.success {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
      display: block;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    /* Forgot password */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: -1rem;
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }
    .forgot-link:hover { color: var(--aqua); }

    /* Form panel */
    .form-panel { display: none; animation: fadeUp 0.4s ease; }
    .form-panel.active { display: block; }

    /* Forgot modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-card {
      background: var(--midnight-blue);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      transform: scale(0.9);
      transition: var(--transition);
      box-shadow: var(--shadow-blue);
    }
    .modal-overlay.active .modal-card { transform: scale(1); }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1.2rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.3rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .modal-close:hover { color: var(--white); }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--white);
      margin-bottom: 0.3rem;
    }
    .modal-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Remember me */
    .remember-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .remember-wrap input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--aqua);
      cursor: pointer;
    }
    .remember-wrap label {
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    /* Nav link */
    .auth-nav-link {
      display: block;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
      margin-top: 1.2rem;
      transition: var(--transition);
    }
    .auth-nav-link a { color: var(--aqua); font-weight: 700; text-decoration: none; }
    .auth-nav-link a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .auth-card { padding: 2rem 1.5rem; border-radius: 20px; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="brand-logo">✦</span>
      <h1>Masuk ke Akun</h1>
      <p>Aika Sesilia Merch Store</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">🔑 Masuk</button>
      <button class="auth-tab" id="tabGuest" onclick="switchTab('guest')">👤 Sebagai Tamu</button>
    </div>

    <div class="auth-alert" id="authAlert"></div>

    <!-- ── LOGIN FORM ── -->
    <div class="form-panel active" id="panelLogin">
      <div class="form-group">
        <label for="login-email">Email / Username</label>
        <div class="input-icon-wrap">
          <span class="input-icon">✉️</span>
          <input type="text" id="login-email" placeholder="email@contoh.com" autocomplete="username"
            onkeydown="if(event.key==='Enter')doLogin()" />
        </div>
      </div>

      <div class="form-group" style="margin-bottom:0.5rem">
        <label for="login-password">Password</label>
        <div class="password-wrap input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-password" placeholder="Password kamu" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()" />
          <button class="toggle-pw" type="button" onclick="togglePw()" id="pwToggle">👁</button>
        </div>
      </div>

      <a href="#" class="forgot-link" onclick="openForgot();return false">Lupa password?</a>

      <div class="remember-wrap">
        <input type="checkbox" id="rememberMe" checked />
        <label for="rememberMe">Ingat saya di perangkat ini</label>
      </div>

      <button class="btn-primary w100" onclick="doLogin()" style="padding:1rem;font-size:1rem" id="loginBtn">
        Masuk →
      </button>

      <p class="auth-nav-link">Belum punya akun? <a href="register.html">Daftar Sekarang</a></p>
    </div><!-- /panelLogin -->

    <!-- ── GUEST FORM ── -->
    <div class="form-panel" id="panelGuest">
      <div class="form-group">
        <label for="guest-name">Nama Lengkap</label>
        <div class="input-icon-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="guest-name" placeholder="Nama kamu" autocomplete="name" />
        </div>
      </div>
      <div class="form-group">
        <label for="guest-email">Email (untuk konfirmasi pesanan)</label>
        <div class="input-icon-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="guest-email" placeholder="email@contoh.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label for="guest-phone">Nomor HP</label>
        <div style="display:flex;gap:0.5rem">
          <div style="background:rgba(3,9,31,0.7);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:0.8rem;color:var(--text-muted);font-size:0.9rem;white-space:nowrap;display:flex;align-items:center;gap:0.3rem;flex-shrink:0">🇮🇩 +62</div>
          <input type="tel" id="guest-phone" placeholder="812 3456 7890" autocomplete="tel" style="flex:1" />
        </div>
      </div>

      <button class="btn-primary w100" onclick="continueAsGuest()" style="padding:1rem;font-size:1rem">
        Lanjut Belanja Sebagai Tamu →
      </button>

      <p class="auth-nav-link">Ingin akun penuh? <a href="register.html">Daftar Gratis</a></p>
    </div><!-- /panelGuest -->

  </div><!-- /auth-card -->

  <a href="index.html" class="auth-nav-link" style="color:var(--text-muted);opacity:0.6;font-size:0.8rem;margin-top:1rem">
    ← Kembali ke Toko
  </a>
</div><!-- /auth-wrapper -->

<!-- ── Forgot Password Modal ── -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeForgot()">✕</button>
    <p class="modal-title">🔐 Reset Password</p>
    <p class="modal-sub">Masukkan email yang terdaftar. Kami akan mengirimkan instruksi reset password.</p>
    <div class="auth-alert" id="forgotAlert"></div>
    <div class="form-group">
      <label for="forgot-email">Alamat Email</label>
      <div class="input-icon-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="forgot-email" placeholder="email@contoh.com"
          onkeydown="if(event.key==='Enter')sendReset()" />
      </div>
    </div>
    <button class="btn-primary w100" onclick="sendReset()" style="padding:1rem;font-size:1rem">
      Kirim Link Reset →
    </button>
  </div>
</div>

<script>
/* ── Stars ── */
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px`;
    c.appendChild(s);
  }
})();

/* ── Tab switch ── */
function switchTab(tab) {
  ['Login','Guest'].forEach(t => {
    document.getElementById('tab'+t).classList.toggle('active', t.toLowerCase() === tab);
    document.getElementById('panel'+t).classList.toggle('active', t.toLowerCase() === tab);
  });
  clearAlert();
}

/* ── Alert ── */
function showAlert(msg, type='error', target='authAlert') {
  const el = document.getElementById(target);
  el.className = 'auth-alert ' + type;
  el.innerHTML = (type==='error'?'⚠ ':'✅ ') + msg;
  setTimeout(() => { el.className = 'auth-alert'; }, 5000);
}
function clearAlert() { document.getElementById('authAlert').className = 'auth-alert'; }

/* ── Toggle password ── */
function togglePw() {
  const pw = document.getElementById('login-password');
  const btn = document.getElementById('pwToggle');
  if (pw.type==='password') { pw.type='text'; btn.textContent='🙈'; }
  else { pw.type='password'; btn.textContent='👁'; }
}

/* ── Login ── */
function doLogin() {
  const identifier = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const remember = document.getElementById('rememberMe').checked;

  if (!identifier) return showAlert('Masukkan email atau username kamu!');
  if (!password) return showAlert('Masukkan password kamu!');

  // Try API first
  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ identifier, password })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      onLoginSuccess(data.user, remember);
    } else {
      showAlert(data.message || 'Email/username atau password salah!');
    }
  })
  .catch(() => {
    // Fallback: check localStorage (demo mode)
    const users = JSON.parse(localStorage.getItem('aika_users') || '[]');
    const encodedPw = btoa(password);
    const user = users.find(u =>
      (u.email === identifier || u.username === identifier) && u.password === encodedPw
    );
    if (user) {
      if (!user.verified) return showAlert('Akun belum diverifikasi! Silahkan verifikasi email kamu.');
      onLoginSuccess(user, remember);
    } else {
      showAlert('Email/username atau password salah!');
      document.getElementById('login-password').value = '';
    }
  });
}

function onLoginSuccess(user, remember) {
  showAlert('Berhasil masuk! Mengalihkan...', 'success');
  const sessionData = { email: user.email, username: user.username, loggedIn: true };
  if (remember) {
    localStorage.setItem('aika_session', JSON.stringify(sessionData));
  } else {
    sessionStorage.setItem('aika_session', JSON.stringify(sessionData));
  }
  setTimeout(() => {
    const redir = new URLSearchParams(location.search).get('redirect') || 'index.html';
    window.location.href = redir;
  }, 1200);
}

/* ── Guest ── */
function continueAsGuest() {
  const name = document.getElementById('guest-name').value.trim();
  const email = document.getElementById('guest-email').value.trim();
  const phone = document.getElementById('guest-phone').value.trim();

  if (!name) return showAlert('Masukkan nama kamu!');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showAlert('Masukkan email yang valid!');

  sessionStorage.setItem('aika_guest', JSON.stringify({ name, email, phone: '+62'+phone.replace(/\D/g,''), isGuest: true }));
  showAlert('Melanjutkan sebagai tamu...', 'success');
  setTimeout(() => {
    const redir = new URLSearchParams(location.search).get('redirect') || 'index.html';
    window.location.href = redir;
  }, 1000);
}

/* ── Forgot Password Modal ── */
function openForgot() {
  document.getElementById('forgotModal').classList.add('active');
  setTimeout(() => document.getElementById('forgot-email').focus(), 300);
}
function closeForgot() {
  document.getElementById('forgotModal').classList.remove('active');
  document.getElementById('forgotAlert').className = 'auth-alert';
}
document.getElementById('forgotModal').addEventListener('click', function(e) {
  if (e.target === this) closeForgot();
});

function sendReset() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return showAlert('Masukkan email yang valid!', 'error', 'forgotAlert');
  }

  fetch('/api/forgot-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  }).catch(() => {});

  showAlert('Jika email terdaftar, instruksi reset password telah dikirim. Periksa inbox kamu!', 'success', 'forgotAlert');
}

/* ── Auto-fill if coming from register ── */
const pendingEmail = localStorage.getItem('aika_pending_login');
if (pendingEmail) {
  document.getElementById('login-email').value = pendingEmail;
  localStorage.removeItem('aika_pending_login');
}

/* ── Already logged in? ── */
const existing = localStorage.getItem('aika_session') || sessionStorage.getItem('aika_session');
if (existing) {
  try {
    const sess = JSON.parse(existing);
    if (sess.loggedIn) {
      const redir = new URLSearchParams(location.search).get('redirect') || 'index.html';
      window.location.href = redir;
    }
  } catch {}
}
</script>
</body>
</html>
