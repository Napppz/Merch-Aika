<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — Aika Sesilia</title>
  <meta name="description" content="Masuk ke akun Aika Sesilia kamu untuk berbelanja lebih mudah dan melihat riwayat pesanan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 20%, rgba(21,101,192,0.25), transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(41,182,246,0.1), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Stars */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--aqua);
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:.8;transform:scale(1.2)} }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
    }

    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-blue), 0 0 80px rgba(41,182,246,0.08);
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--sea-blue), var(--aqua), var(--sea-blue));
      background-size: 200% 100%;
      animation: shimmerBar 3s linear infinite;
    }
    @keyframes shimmerBar { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo .brand-logo {
      font-size: 2.8rem;
      display: block;
      color: var(--aqua);
      animation: spin 8s linear infinite;
    }
    .auth-logo h1 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--white);
      margin: 0.6rem 0 0.2rem;
    }
    .auth-logo p { color: var(--text-muted); font-size: 0.85rem; }



    /* Input with icon */
    .input-icon-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 1rem; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.6;
    }
    .input-icon-wrap input { padding-left: 2.8rem !important; }

    /* Password toggle */
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 3rem !important; }
    .toggle-pw {
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      transition: var(--transition);
    }
    .toggle-pw:hover { color: var(--aqua); }

    /* Alert */
    .auth-alert {
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      animation: fadeUp 0.3s ease;
      display: none;
    }
    .auth-alert.error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      display: block;
    }
    .auth-alert.success {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
      display: block;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    /* Forgot password */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: -1rem;
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }
    .forgot-link:hover { color: var(--aqua); }



    /* Forgot modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-card {
      background: var(--midnight-blue);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      transform: scale(0.9);
      transition: var(--transition);
      box-shadow: var(--shadow-blue);
    }
    .modal-overlay.active .modal-card { transform: scale(1); }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1.2rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.3rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .modal-close:hover { color: var(--white); }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--white);
      margin-bottom: 0.3rem;
    }
    .modal-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Remember me */
    .remember-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .remember-wrap input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--aqua);
      cursor: pointer;
    }
    .remember-wrap label {
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    /* Nav link */
    .auth-nav-link {
      display: block;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
      margin-top: 1.2rem;
      transition: var(--transition);
    }
    .auth-nav-link a { color: var(--aqua); font-weight: 700; text-decoration: none; }
    .auth-nav-link a:hover { text-decoration: underline; }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.7rem;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 10px;
      transition: var(--transition);
    }
    .auth-tab.active {
      color: var(--white);
      background: rgba(41,182,246,0.15);
      border: 1px solid rgba(41,182,246,0.2);
    }

    @media (max-width: 560px) {
      .auth-card { padding: 2rem 1.5rem; border-radius: 20px; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="brand-logo">✦</span>
      <h1>Masuk ke Akun</h1>
      <p>Aika Sesilia Merch Store</p>
    </div>



    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-user" onclick="switchRole('user')">👤 User</div>
      <div class="auth-tab" id="tab-admin" onclick="switchRole('admin')">🔑 Admin</div>
    </div>

    <div class="auth-alert" id="authAlert"></div>

    <!-- ── LOGIN FORM ── -->
    <div class="form-group">
      <label for="login-email">Email / Username</label>
      <div class="input-icon-wrap">
        <span class="input-icon">✉️</span>
        <input type="text" id="login-email" placeholder="email@contoh.com" autocomplete="username"
          onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
    </div>

    <div class="form-group" style="margin-bottom:0.5rem">
      <label for="login-password">Password</label>
      <div class="password-wrap input-icon-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="login-password" placeholder="Password kamu" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()" />
        <button class="toggle-pw" type="button" onclick="togglePw()" id="pwToggle">👁</button>
      </div>
    </div>

    <a href="#" class="forgot-link" onclick="openForgot();return false">Lupa password?</a>

    <div class="remember-wrap">
      <input type="checkbox" id="rememberMe" checked />
      <label for="rememberMe">Ingat saya di perangkat ini</label>
    </div>

    <button class="btn-primary w100" onclick="doLogin()" style="padding:1rem;font-size:1rem" id="loginBtn">
      Masuk →
    </button>

    <p class="auth-nav-link" id="registerLink">Belum punya akun? <a href="register.html">Daftar Sekarang</a></p>



  </div><!-- /auth-card -->

  <a href="index.html" class="auth-nav-link" style="color:var(--text-muted);opacity:0.6;font-size:0.8rem;margin-top:1rem">
    ← Kembali ke Toko
  </a>
</div><!-- /auth-wrapper -->

<!-- ── Forgot Password Modal ── -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeForgot()">✕</button>
    <p class="modal-title">🔐 Reset Password</p>
    <p class="modal-sub">Masukkan email yang terdaftar. Kami akan mengirimkan instruksi reset password.</p>
    <div class="auth-alert" id="forgotAlert"></div>
    <div class="form-group">
      <label for="forgot-email">Alamat Email</label>
      <div class="input-icon-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="forgot-email" placeholder="email@contoh.com"
          onkeydown="if(event.key==='Enter')sendReset()" />
      </div>
    </div>
    <button class="btn-primary w100" onclick="sendReset()" style="padding:1rem;font-size:1rem">
      Kirim Link Reset →
    </button>
  </div>
</div>

<script>
/* ── Stars ── */
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px`;
    c.appendChild(s);
  }
})();



/* ── Alert ── */
function showAlert(msg, type='error', target='authAlert') {
  const el = document.getElementById(target);
  el.className = 'auth-alert ' + type;
  el.innerHTML = (type==='error'?'⚠ ':'✅ ') + msg;
  setTimeout(() => { el.className = 'auth-alert'; }, 5000);
}
function clearAlert() { document.getElementById('authAlert').className = 'auth-alert'; }

/* ── Toggle password ── */
function togglePw() {
  const pw = document.getElementById('login-password');
  const btn = document.getElementById('pwToggle');
  if (pw.type==='password') { pw.type='text'; btn.textContent='🙈'; }
  else { pw.type='password'; btn.textContent='👁'; }
}

/* ── localStorage login check (helper) ── */
function tryLocalLogin(identifier, password, remember) {
  const users = JSON.parse(localStorage.getItem('aika_users') || '[]');
  const encodedPw = btoa(password);
  const user = users.find(u =>
    (u.email === identifier || u.username === identifier) && u.password === encodedPw
  );
  if (user) {
    if (!user.verified) { showAlert('Akun belum diverifikasi!'); return false; }
    onLoginSuccess(user, remember);
    return true;
  }
  return false;
}

/* ── Role Management ── */
let currentRole = 'user';

function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + role).classList.add('active');
  
  const regLink = document.getElementById('registerLink');
  const forgotLink = document.querySelector('.forgot-link');
  const rememberWrap = document.querySelector('.remember-wrap');
  
  if (role === 'admin') {
    regLink.style.display = 'none';
    forgotLink.style.display = 'none';
    rememberWrap.style.display = 'none';
    document.getElementById('login-email').placeholder = 'Username Admin';
  } else {
    regLink.style.display = 'block';
    forgotLink.style.display = 'block';
    rememberWrap.style.display = 'flex';
    document.getElementById('login-email').placeholder = 'email@contoh.com';
  }
  clearAlert();
}

/* ── Login ── */
function doLogin() {
  const identifier = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const remember = document.getElementById('rememberMe').checked;

  if (!identifier) return showAlert(`Masukkan ${currentRole === 'admin' ? 'username' : 'email/username'} kamu!`);
  if (!password) return showAlert('Masukkan password kamu!');

  const btn = document.getElementById('loginBtn');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">✦</span> Memproses...';

  if (currentRole === 'admin') {
    // Admin Login Logic with API
    fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: identifier, password: password })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        localStorage.setItem('aika_admin', 'true');
        localStorage.setItem('aika_admin_user', JSON.stringify(data.admin));
        showAlert('Berhasil masuk Admin! Mengalihkan...', 'success');
        setTimeout(() => window.location.href = 'admin/dashboard.html', 1000);
      } else {
        showAlert(data.message || 'Username atau password admin salah!');
        document.getElementById('login-password').value = '';
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    })
    .catch(err => {
      console.error('Admin login error:', err);
      showAlert('Koneksi server gagal. Coba lagi.');
      document.getElementById('login-password').value = '';
      btn.disabled = false;
      btn.innerHTML = originalText;
    });
    return;
  }

  // User Login Logic
  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ identifier, password })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      onLoginSuccess(data.user, remember);
    } else {
      if (!tryLocalLogin(identifier, password, remember)) {
        showAlert(data.message || 'Email/username atau password salah!');
        document.getElementById('login-password').value = '';
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }
  })
  .catch(() => {
    if (!tryLocalLogin(identifier, password, remember)) {
      showAlert('Email/username atau password salah!');
      document.getElementById('login-password').value = '';
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  });
}

function onLoginSuccess(user, remember) {
  showAlert('Berhasil masuk! Mengalihkan...', 'success');
  const sessionData = { email: user.email, username: user.username, loggedIn: true };
  if (remember) {
    localStorage.setItem('aika_session', JSON.stringify(sessionData));
  } else {
    sessionStorage.setItem('aika_session', JSON.stringify(sessionData));
  }
  setTimeout(() => {
    const redir = new URLSearchParams(location.search).get('redirect') || 'index.html';
    window.location.href = redir;
  }, 1200);
}



/* ── Forgot Password Modal ── */
function openForgot() {
  document.getElementById('forgotModal').classList.add('active');
  setTimeout(() => document.getElementById('forgot-email').focus(), 300);
}
function closeForgot() {
  document.getElementById('forgotModal').classList.remove('active');
  document.getElementById('forgotAlert').className = 'auth-alert';
}
document.getElementById('forgotModal').addEventListener('click', function(e) {
  if (e.target === this) closeForgot();
});

async function sendReset() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return showAlert('Masukkan email yang valid!', 'error', 'forgotAlert');
  }

  showAlert('Memproses...', 'success', 'forgotAlert');
  try {
    const res = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');
    
    showAlert('Instruksi reset password telah dikirim. Periksa inbox/spam kamu!', 'success', 'forgotAlert');
  } catch (err) {
    showAlert(err.message, 'error', 'forgotAlert');
  }
}

/* ── Auto-fill if coming from register ── */
const pendingEmail = localStorage.getItem('aika_pending_login');
if (pendingEmail) {
  document.getElementById('login-email').value = pendingEmail;
  localStorage.removeItem('aika_pending_login');
}

/* ── Initial Check & URL Params ── */
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('role') === 'admin') {
  switchRole('admin');
}

/* ── Already logged in? ── */
const existing = localStorage.getItem('aika_session') || sessionStorage.getItem('aika_session');
const isAdmin = localStorage.getItem('aika_admin') === 'true';

if (isAdmin) {
  window.location.href = 'admin/dashboard.html';
} else if (existing) {
  try {
    const sess = JSON.parse(existing);
    if (sess.loggedIn) {
      const redir = urlParams.get('redirect') || 'index.html';
      window.location.href = redir;
    }
  } catch {}
}

/* ── Reset Password Link Flow ── */
const resetToken = urlParams.get('reset');
if (resetToken) {
  const authCard = document.querySelector('.auth-card');
  authCard.innerHTML = `
    <div class="auth-logo">
      <span class="brand-logo">✦</span>
      <h1>Reset Password</h1>
      <p>Masukkan password barumu di bawah ini</p>
    </div>
    <div class="auth-alert" id="resetAlert"></div>
    <div class="form-group" style="margin-bottom:1.5rem">
      <label>Password Baru</label>
      <div class="password-wrap input-icon-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="reset-password" placeholder="Minimal 6 karakter" />
        <button class="toggle-pw" type="button" onclick="const pw=document.getElementById('reset-password'); if(pw.type==='password'){pw.type='text';this.textContent='🙈'}else{pw.type='password';this.textContent='👁'}">👁</button>
      </div>
    </div>
    <button class="btn-primary w100" onclick="submitNewPassword('${resetToken}')" style="padding:1rem;font-size:1rem">
      Simpan Password →
    </button>
    <a href="login.html" class="auth-nav-link" style="margin-top:2rem;text-decoration:none">Kembali ke Login</a>
  `;
}

async function submitNewPassword(token) {
  const newPass = document.getElementById('reset-password').value;
  if(newPass.length < 6) return showAlert('Password minimal 6 karakter', 'error', 'resetAlert');
  
  try {
    const res = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword: newPass })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Gagal reset password');
    
    showAlert('Password berhasil diubah! Silakan login.', 'success', 'resetAlert');
    setTimeout(() => window.location.href = 'login.html', 2000);
  } catch(err) {
    showAlert(err.message, 'error', 'resetAlert');
  }
}
</script>
</body>
</html>
